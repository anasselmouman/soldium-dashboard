{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="space-y-6">
  <div id="alert" class="hidden rounded-lg border px-4 py-3 text-sm" role="alert"></div>

  <div class="soldium-cut-card p-4">
    <h2 class="text-sm font-semibold text-white mb-3">إضافة مزوّد جديد</h2>
    <form id="create-provider-form" class="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1">المعرّف (slug)</label>
        <input name="slug" required pattern="[a-z][a-z0-9_-]*" placeholder="panel2"
          class="w-full rounded-lg border border-slate-600 bg-surface-800 px-3 py-2 text-sm text-white" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">الاسم المعروض</label>
        <input name="name" required placeholder="مزوّد جديد"
          class="w-full rounded-lg border border-slate-600 bg-surface-800 px-3 py-2 text-sm text-white" />
      </div>
      <div class="md:col-span-2">
        <label class="block text-xs text-slate-400 mb-1">رابط API</label>
        <input name="api_base_url" required placeholder="https://example.com/api/v2"
          class="w-full rounded-lg border border-slate-600 bg-surface-800 px-3 py-2 text-sm text-white" />
      </div>
      <div class="lg:col-span-4">
        <button type="submit"
          class="rounded-lg border border-emerald-500/40 bg-emerald-500/10 px-4 py-2 text-sm font-medium text-emerald-200 hover:bg-emerald-500/20">
          إنشاء المزوّد
        </button>
      </div>
    </form>
  </div>

  <div id="loading" class="text-center text-slate-400 py-10">جاري التحميل…</div>
  <div id="providers-wrap" class="hidden space-y-4"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
  const els = {
    alert: document.getElementById("alert"),
    loading: document.getElementById("loading"),
    wrap: document.getElementById("providers-wrap"),
    createForm: document.getElementById("create-provider-form"),
  };

  function showAlert(message, type = "error") {
    els.alert.textContent = message;
    els.alert.className =
      "rounded-lg border px-4 py-3 text-sm " +
      (type === "error"
        ? "border-red-900/60 bg-red-950/40 text-red-200"
        : "border-emerald-900/60 bg-emerald-950/40 text-emerald-200");
    els.alert.classList.remove("hidden");
  }

  function escapeHtml(t) {
    const d = document.createElement("div");
    d.textContent = t ?? "";
    return d.innerHTML;
  }

  async function fetchJson(url, options) {
    const res = await fetch(url, { credentials: "same-origin", ...options });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
      const detail = typeof body.detail === "string" ? body.detail : "فشل الطلب.";
      throw new Error(detail);
    }
    return body;
  }

  function accountRow(providerSlug, account) {
    const envOk = account.env_configured
      ? '<span class="text-emerald-400 text-[10px]">مفتاح .env مضبوط</span>'
      : '<span class="text-amber-400 text-[10px]">مفتاح .env غير مضبوط</span>';
    return `
      <div class="rounded-lg border border-slate-800 bg-surface-900/60 p-3 flex flex-wrap items-center gap-3 justify-between"
           data-provider="${escapeHtml(providerSlug)}" data-account="${escapeHtml(account.account_key)}">
        <div>
          <div class="text-sm font-medium text-white">${escapeHtml(account.display_name || account.account_key)}</div>
          <div class="text-xs text-slate-500 font-mono">${escapeHtml(account.account_key)} · ${escapeHtml(account.api_key_env)}</div>
          ${envOk}
        </div>
        <div class="flex flex-wrap gap-2 items-center">
          <input type="text" data-field="display_name" value="${escapeHtml(account.display_name || "")}"
            placeholder="اسم العرض"
            class="rounded border border-slate-700 bg-surface-800 px-2 py-1 text-xs text-white w-36" />
          <label class="inline-flex items-center gap-1 text-xs text-slate-300">
            <input type="checkbox" data-field="is_active" ${account.is_active ? "checked" : ""}
              class="rounded border-slate-600 bg-surface-800 text-emerald-500" />
            نشط
          </label>
          <button type="button" data-action="save-account"
            class="rounded border border-slate-700 px-2 py-1 text-xs text-slate-200 hover:bg-surface-700">حفظ</button>
        </div>
      </div>
    `;
  }

  function providerCard(provider) {
    const accounts = (provider.accounts || []).map((a) => accountRow(provider.slug, a)).join("");
    const status = provider.is_active
      ? '<span class="text-emerald-400 text-xs">نشط</span>'
      : '<span class="text-amber-400 text-xs">موقوف</span>';
    return `
      <article class="soldium-cut-card p-4 space-y-4" data-provider="${escapeHtml(provider.slug)}">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h3 class="text-lg font-semibold text-white">${escapeHtml(provider.name)}</h3>
            <div class="text-xs text-slate-500 font-mono mt-1">${escapeHtml(provider.slug)} · ${escapeHtml(provider.adapter_type)}</div>
            <div class="text-xs text-slate-400 mt-1 break-all">${escapeHtml(provider.api_base_url)}</div>
            ${status}
          </div>
          <label class="inline-flex items-center gap-2 text-xs text-slate-300">
            <input type="checkbox" data-field="provider-active" ${provider.is_active ? "checked" : ""}
              class="rounded border-slate-600 bg-surface-800 text-emerald-500" />
            مفعّل
          </label>
        </div>
        <div class="space-y-2">${accounts || '<p class="text-sm text-slate-500">لا توجد حسابات.</p>'}</div>
        <form class="add-account-form grid gap-2 md:grid-cols-4 border-t border-slate-800 pt-3"
              data-provider="${escapeHtml(provider.slug)}">
          <input name="account_key" required placeholder="account_key" pattern="[a-z][a-z0-9_-]*"
            class="rounded border border-slate-700 bg-surface-800 px-2 py-1.5 text-xs text-white" />
          <input name="display_name" placeholder="اسم العرض (تيك توك…)"
            class="rounded border border-slate-700 bg-surface-800 px-2 py-1.5 text-xs text-white" />
          <input name="api_key_env" required placeholder="SMM_KEY_EXAMPLE"
            class="rounded border border-slate-700 bg-surface-800 px-2 py-1.5 text-xs text-white" />
          <button type="submit"
            class="rounded border border-accent-500/40 bg-accent-500/10 px-2 py-1.5 text-xs text-accent-200">إضافة حساب</button>
        </form>
      </article>
    `;
  }

  async function loadProviders() {
    els.loading.classList.remove("hidden");
    els.wrap.classList.add("hidden");
    try {
      const data = await fetchJson("/api/providers");
      els.wrap.innerHTML = (data.providers || []).map(providerCard).join("");
      els.wrap.classList.remove("hidden");
    } catch (e) {
      showAlert(e.message);
    } finally {
      els.loading.classList.add("hidden");
    }
  }

  els.createForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(els.createForm);
    try {
      await fetchJson("/api/providers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          slug: fd.get("slug"),
          name: fd.get("name"),
          api_base_url: fd.get("api_base_url"),
        }),
      });
      els.createForm.reset();
      showAlert("تم إنشاء المزوّد.", "success");
      await loadProviders();
    } catch (err) {
      showAlert(err.message);
    }
  });

  els.wrap.addEventListener("click", async (e) => {
    const btn = e.target.closest('[data-action="save-account"]');
    if (!btn) return;
    const row = btn.closest("[data-provider][data-account]");
    if (!row) return;
    const slug = row.dataset.provider;
    const account = row.dataset.account;
    const display_name = row.querySelector('[data-field="display_name"]')?.value ?? "";
    const is_active = row.querySelector('[data-field="is_active"]')?.checked ?? false;
    try {
      await fetchJson(`/api/providers/${encodeURIComponent(slug)}/accounts/${encodeURIComponent(account)}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ display_name, is_active }),
      });
      showAlert("تم حفظ الحساب.", "success");
      await loadProviders();
    } catch (err) {
      showAlert(err.message);
    }
  });

  els.wrap.addEventListener("change", async (e) => {
    if (e.target.dataset.field !== "provider-active") return;
    const article = e.target.closest("[data-provider]");
    if (!article) return;
    const slug = article.dataset.provider;
    try {
      await fetchJson(`/api/providers/${encodeURIComponent(slug)}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ is_active: e.target.checked }),
      });
      showAlert("تم تحديث حالة المزوّد.", "success");
    } catch (err) {
      showAlert(err.message);
      e.target.checked = !e.target.checked;
    }
  });

  els.wrap.addEventListener("submit", async (e) => {
    const form = e.target.closest(".add-account-form");
    if (!form) return;
    e.preventDefault();
    const slug = form.dataset.provider;
    const fd = new FormData(form);
    try {
      await fetchJson(`/api/providers/${encodeURIComponent(slug)}/accounts`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          account_key: fd.get("account_key"),
          display_name: fd.get("display_name") || null,
          api_key_env: fd.get("api_key_env"),
        }),
      });
      form.reset();
      showAlert("تمت إضافة الحساب.", "success");
      await loadProviders();
    } catch (err) {
      showAlert(err.message);
    }
  });

  loadProviders();
</script>
{% endblock %}
