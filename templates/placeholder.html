{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="soldium-cut-card p-8 sm:p-12 text-center max-w-lg mx-auto">
  <div class="inline-flex h-14 w-14 items-center justify-center rounded-xl border border-accent-500/30 bg-accent-500/10 text-2xl mb-4">
    {{ placeholder_icon | default("🚧") }}
  </div>
  <h2 class="text-xl font-bold text-white">{{ page_heading }}</h2>
  <p class="mt-3 text-sm text-slate-400 leading-relaxed">{{ placeholder_message }}</p>
  <a
    href="/"
    class="inline-flex mt-6 rounded-lg bg-accent-600 hover:bg-accent-500 px-5 py-2.5 text-sm font-medium text-white transition"
  >
    العودة إلى الرئيسية
  </a>
</section>
{% endblock %}
